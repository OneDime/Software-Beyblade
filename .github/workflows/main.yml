name: Aggiornamento Notturno Database Beyblade

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow

      - name: Esecuzione Script Scraping
        run: python beyblade_x.py

      - name: Commit e Push delle modifiche
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Aggiornamento automatico notturno CSV e Immagini"
          file_pattern: "beyblade_x.csv images/*"
