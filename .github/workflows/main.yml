name: Aggiornamento Notturno Database Beyblade

on:
  schedule:
    # Esegue alle 03:00 UTC tutti i giorni (che corrispondono alle 04:00 o 05:00 in Italia a seconda dell'ora legale)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permette anche di avviarlo manualmente con un tasto da GitHub se serve

permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installazione Dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow

      - name: Esecuzione Script Scraping
        run: python beyblade_x.py

      - name: Commit e Push delle modifiche
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🤖 Aggiornamento automatico notturno CSV e Immagini"
          file_pattern: "beyblade_x.csv images/*"
